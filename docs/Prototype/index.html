<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horario · Turnos</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased min-h-screen">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

  <!-- Encabezado -->
  <header class="flex flex-wrap items-center justify-between gap-4">
    <div>
      <h1 class="text-lg font-semibold text-slate-100">Horario de turnos</h1>
      <p id="headerSubtitle" class="text-sm text-slate-500">Cargá tu archivo Excel para comenzar</p>
    </div>
    <div class="flex items-center gap-2">
      <button id="changeFileBtn" class="hidden rounded-lg border border-slate-700 bg-slate-900 px-3 py-1.5 text-sm text-slate-300 hover:border-indigo-400 hover:text-indigo-300 transition-colors">
        Cambiar archivo
      </button>
      <input id="fileInput" type="file" accept=".xlsx,.xls" class="hidden">
    </div>
  </header>

  <!-- Banner de avisos (hojas omitidas, errores no bloqueantes) -->
  <div id="warningBanner" class="hidden rounded-lg border border-amber-500/30 bg-amber-500/10 p-3 text-sm text-amber-200"></div>

  <!-- Estado vacío / carga -->
  <div id="emptyState" class="rounded-2xl border border-dashed border-slate-700 bg-slate-900/40 p-10 text-center">
    <p class="text-slate-300 font-medium">Arrastrá tu archivo .xlsx aquí, o hacé clic para elegirlo</p>
    <p class="mt-1 text-sm text-slate-500">Todo se procesa en tu navegador. El archivo nunca se envía a ningún servidor.</p>
    <button id="pickFileBtn" class="mt-4 rounded-lg bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-400 transition-colors">
      Elegir archivo
    </button>
  </div>

  <!-- Error de datos -->
  <div id="errorState" class="hidden rounded-2xl border border-rose-500/30 bg-rose-500/10 p-6 text-rose-200"></div>

  <!-- Panel principal -->
  <div id="dashboard" class="hidden space-y-6">

    <!-- Pestañas de mes -->
    <div id="monthTabs" class="flex gap-2"></div>

    <!-- Tarjetas de dashboard -->
    <div id="dashboardCards" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Columna principal -->
      <div class="lg:col-span-2 space-y-6">
        <div id="summaryCard"></div>
        <div id="calendarSection" class="rounded-2xl border border-slate-800 bg-slate-900/60 p-5"></div>
        <div id="agendaSection" class="rounded-2xl border border-slate-800 bg-slate-900/60 p-5"></div>
      </div>

      <!-- Columna lateral -->
      <div class="space-y-6">
        <div id="nextShiftCard"></div>
        <div id="nextRestCard"></div>
        <div id="coworkersCard"></div>
        <div id="statsSection"></div>
      </div>
    </div>
  </div>

  <footer class="pt-2 text-center text-xs text-slate-600">
    Procesado localmente en tu navegador con SheetJS · sin backend, sin instalación.
  </footer>
</div>

<script>
// ============================================================
// CONSTANTES
// ============================================================
const REST_VALUE = 'Libre';
const TARGET_EMPLOYEE = 'PEREZ LOPEZ JOSUE ADONAI';
const WATCHED_COWORKERS = ['DUEÑAS MEJIA CARLOS ANTONIO', 'OCHOA VASQUEZ LUIS GERARDO'];
const SLEEP_HOURS_TARGET = 8;
const SHIFT_PATTERN = /^(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})$/;
const WEEKDAY_FULL = ['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];
const MONTH_NAMES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

const STATUS_META = {
  trabajo:     { emoji: '🟢', label: 'Trabajo',    text: 'text-emerald-400', bg: 'bg-emerald-500/10' },
  descanso:    { emoji: '🔵', label: 'Descanso',   text: 'text-sky-400',     bg: 'bg-sky-500/10' },
  vacaciones:  { emoji: '🟡', label: 'Vacaciones', text: 'text-amber-300',   bg: 'bg-amber-400/10' },
  desconocido: { emoji: '⚪', label: 'Sin datos',  text: 'text-slate-400',   bg: 'bg-slate-500/10' }
};

// ============================================================
// UTILIDADES
// ============================================================
function normalize(str) {
  return (str || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim().toUpperCase().replace(/\s+/g, ' ');
}

function namesMatch(a, b) { return normalize(a) === normalize(b); }

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function toTitleCase(str) {
  return str.toLowerCase().split(' ').filter(Boolean)
    .map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function pad2(n) { return String(n).padStart(2, '0'); }

// SheetJS entrega las fechas de Excel como Date en UTC; se reconstruyen
// en medianoche LOCAL para que toda comparación posterior use el mismo huso horario.
function excelDateToLocalMidnight(d) {
  return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
}

function toKey(date) { return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`; }
function fromKey(key) { const [y, m, d] = key.split('-').map(Number); return new Date(y, m - 1, d); }
function stripTime(date) { return new Date(date.getFullYear(), date.getMonth(), date.getDate()); }

function withTime(localMidnight, h, m, dayOffset = 0) {
  const d = new Date(localMidnight);
  d.setDate(d.getDate() + dayOffset);
  d.setHours(h, m, 0, 0);
  return d;
}

function formatDateLong(d) {
  const wd = WEEKDAY_FULL[(d.getDay() + 6) % 7];
  return `${wd} ${d.getDate()} de ${MONTH_NAMES_ES[d.getMonth()]}`;
}

function formatDateShort(d) { return `${d.getDate()} ${MONTH_NAMES_ES[d.getMonth()].slice(0, 3)}`; }

function relativeDayLabel(dateLocalMidnight, todayLocalMidnight) {
  const diffDays = Math.round((dateLocalMidnight - todayLocalMidnight) / 86400000);
  if (diffDays === 0) return 'Hoy';
  if (diffDays === 1) return 'Mañana';
  if (diffDays > 1) return `En ${diffDays} días`;
  return `Hace ${-diffDays} días`;
}

function fmtHours(h) {
  if (h === null || h === undefined || !isFinite(h)) return '—';
  const sign = h < 0 ? '-' : '';
  h = Math.abs(h);
  let hh = Math.floor(h);
  let mm = Math.round((h - hh) * 60);
  if (mm === 60) { mm = 0; hh += 1; }
  return `${sign}${hh}h ${mm}m`;
}

// ============================================================
// PARSER — convierte el workbook de SheetJS en un modelo de datos
// ============================================================
function parseShiftValue(rawInput) {
  const raw = (rawInput === undefined || rawInput === null) ? '' : String(rawInput).trim();
  if (!raw) return { type: 'desconocido', raw: '' };
  if (normalize(raw) === normalize(REST_VALUE)) return { type: 'descanso', raw };

  const m = raw.match(SHIFT_PATTERN);
  if (m) {
    const startH = +m[1], startM = +m[2], endH = +m[3], endM = +m[4];
    const startMinutes = startH * 60 + startM;
    let endMinutes = endH * 60 + endM;
    let crosses = false;
    if (endMinutes <= startMinutes) { endMinutes += 24 * 60; crosses = true; }
    const durationHours = (endMinutes - startMinutes) / 60;
    return { type: 'trabajo', raw, startH, startM, endH, endM, crosses, durationHours };
  }

  if (normalize(raw).includes('VACAC')) return { type: 'vacaciones', raw };
  return { type: 'desconocido', raw };
}

function parseWorkbook(workbook) {
  const monthEntries = [];
  const skipped = [];

  for (const sheetName of workbook.SheetNames) {
    try {
      const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1, defval: '', raw: true });
      if (rows.length < 3) {
        skipped.push({ sheetName, reason: 'La hoja no tiene suficientes filas (se esperan encabezados y al menos un empleado).' });
        continue;
      }

      const dateCells = rows[1].slice(2);
      if (!dateCells.some(v => v instanceof Date)) {
        skipped.push({ sheetName, reason: 'No se encontró una fila de fechas reconocible.' });
        continue;
      }
      const dates = dateCells.map(v => (v instanceof Date) ? excelDateToLocalMidnight(v) : null);

      const employees = rows.slice(2)
        .filter(r => r && String(r[1] || '').trim() !== '')
        .map(r => {
          const department = String(r[0] || '').trim();
          const name = String(r[1] || '').trim();
          const cells = r.slice(2);
          const days = [];
          for (let i = 0; i < dates.length; i++) {
            const date = dates[i];
            if (!date) continue;
            const cellValue = cells[i];
            const info = parseShiftValue(cellValue instanceof Date ? '' : cellValue);
            const day = { date, ...info };
            if (day.type === 'trabajo') {
              day.startDateTime = withTime(date, day.startH, day.startM, 0);
              day.endDateTime = withTime(date, day.endH, day.endM, day.crosses ? 1 : 0);
            }
            days.push(day);
          }
          days.sort((a, b) => a.date - b.date);
          return { department, name, days };
        });

      // Solo se consideran empleados del mismo departamento (contiene "N1")
      const n1Employees = employees.filter(e => normalize(e.department).includes('N1'));
      const pool = n1Employees.length ? n1Employees : employees;

      const target = pool.find(e => namesMatch(e.name, TARGET_EMPLOYEE));
      if (!target) {
        skipped.push({ sheetName, reason: `No se encontró a ${toTitleCase(TARGET_EMPLOYEE)} en esta hoja.` });
        continue;
      }

      const coworkerDaysByName = {};
      for (const cw of WATCHED_COWORKERS) {
        const emp = pool.find(e => namesMatch(e.name, cw));
        if (emp) coworkerDaysByName[emp.name] = emp.days;
      }

      const firstDate = target.days[0] ? target.days[0].date : null;
      monthEntries.push({
        sheetName,
        department: target.department,
        employeeName: target.name,
        year: firstDate ? firstDate.getFullYear() : null,
        monthIndex: firstDate ? firstDate.getMonth() : null,
        targetDays: target.days,
        coworkerDaysByName
      });
    } catch (err) {
      skipped.push({ sheetName, reason: 'Error al leer la hoja: ' + err.message });
    }
  }

  monthEntries.sort((a, b) => (a.year - b.year) || (a.monthIndex - b.monthIndex));
  return { monthEntries, skipped };
}

// ============================================================
// ESTADÍSTICAS
// ============================================================
function computeMonthStats(monthEntry) {
  const days = monthEntry.targetDays;
  const worked = days.filter(d => d.type === 'trabajo');
  const totalWorkedHours = worked.reduce((sum, d) => sum + d.durationHours, 0);
  const shiftsCount = worked.length;
  const avgShiftHours = shiftsCount ? totalWorkedHours / shiftsCount : null;

  let longestShift = null, shortestShift = null;
  for (const d of worked) {
    if (!longestShift || d.durationHours > longestShift.durationHours) longestShift = d;
    if (!shortestShift || d.durationHours < shortestShift.durationHours) shortestShift = d;
  }

  const restDaysCount = days.filter(d => d.type === 'descanso').length;
  const vacationDaysCount = days.filter(d => d.type === 'vacaciones').length;
  const unknownDaysCount = days.filter(d => d.type === 'desconocido').length;

  let longestStreak = 0, currentStreak = 0;
  for (const d of days) {
    if (d.type === 'trabajo') { currentStreak += 1; longestStreak = Math.max(longestStreak, currentStreak); }
    else currentStreak = 0;
  }

  const sleepGaps = [];
  for (let i = 1; i < worked.length; i++) {
    const gapHours = (worked[i].startDateTime - worked[i - 1].endDateTime) / 3600000;
    sleepGaps.push(gapHours);
  }
  const avgSleepGap = sleepGaps.length ? sleepGaps.reduce((a, b) => a + b, 0) / sleepGaps.length : null;
  const daysBelowTarget = sleepGaps.filter(g => g < SLEEP_HOURS_TARGET).length;
  const daysAtOrAboveTarget = sleepGaps.filter(g => g >= SLEEP_HOURS_TARGET).length;

  return {
    totalWorkedHours, shiftsCount, avgShiftHours, longestShift, shortestShift,
    restDaysCount, vacationDaysCount, unknownDaysCount, longestStreak,
    sleepGaps, avgSleepGap, daysBelowTarget, daysAtOrAboveTarget
  };
}

function getAllTargetDaysSorted(state) { return state.monthEntries.flatMap(m => m.targetDays); }

function findNextShift(allDays, now) {
  for (const d of allDays) {
    if (d.type !== 'trabajo') continue;
    if (d.startDateTime >= now) return d;
  }
  return null;
}

function findNextRest(allDays, now) {
  const todayMidnight = stripTime(now);
  for (const d of allDays) {
    if (d.type !== 'descanso') continue;
    if (d.date >= todayMidnight) return d;
  }
  return null;
}

function getCoworkerMatches(monthEntry, dateKey) {
  const targetDay = monthEntry.targetDays.find(d => toKey(d.date) === dateKey);
  if (!targetDay || targetDay.type !== 'trabajo') return { applicable: false, targetDay: targetDay || null };

  const matches = [];
  for (const [name, days] of Object.entries(monthEntry.coworkerDaysByName)) {
    const cDay = days.find(d => toKey(d.date) === dateKey);
    if (cDay && cDay.type === 'trabajo' && normalize(cDay.raw) === normalize(targetDay.raw)) {
      matches.push({ name, raw: cDay.raw });
    }
  }
  return { applicable: true, targetDay, matches };
}

// ============================================================
// ESTADO
// ============================================================
const state = { monthEntries: [], skipped: [], activeMonthIndex: 0, selectedDateKey: null };

function activeMonth() { return state.monthEntries[state.activeMonthIndex] || null; }

function pickDefaultMonthIndex() {
  const now = new Date();
  const idx = state.monthEntries.findIndex(m => m.year === now.getFullYear() && m.monthIndex === now.getMonth());
  return idx >= 0 ? idx : 0;
}

function pickDefaultSelectedDate() {
  const now = new Date();
  const allDays = getAllTargetDaysSorted(state);
  const next = findNextShift(allDays, now);
  if (next) return toKey(next.date);
  const month = activeMonth();
  return month && month.targetDays.length ? toKey(month.targetDays[0].date) : null;
}

// ============================================================
// RENDERIZADO
// ============================================================
function statusChip(type) {
  const meta = STATUS_META[type];
  return `<span class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-medium ${meta.bg} ${meta.text}">${meta.emoji} ${meta.label}</span>`;
}

function dashboardCard(label, value, sub) {
  return `<div class="rounded-xl border border-slate-800 bg-slate-900/60 p-4">
    <div class="text-xs text-slate-500">${escapeHtml(label)}</div>
    <div class="mt-1 text-xl font-mono font-semibold text-slate-100">${value}</div>
    ${sub ? `<div class="mt-1 text-xs text-slate-500">${sub}</div>` : ''}
  </div>`;
}

function renderMonthTabs() {
  const el = document.getElementById('monthTabs');
  if (state.monthEntries.length < 2) { el.innerHTML = ''; return; }
  el.innerHTML = state.monthEntries.map((m, i) => {
    const active = i === state.activeMonthIndex;
    return `<button type="button" data-monthidx="${i}"
      class="rounded-lg px-3 py-1.5 text-sm font-medium transition-colors ${active ? 'bg-indigo-500 text-white' : 'bg-slate-900 text-slate-400 border border-slate-800 hover:text-slate-200'}">
      ${escapeHtml(toTitleCase(m.sheetName))}
    </button>`;
  }).join('');
}

function renderWarningBanner(unknownDaysCount) {
  const el = document.getElementById('warningBanner');
  const items = state.skipped.map(s => `«${toTitleCase(s.sheetName)}»: ${s.reason}`);
  if (unknownDaysCount > 0) {
    items.push(`Este mes tiene ${unknownDaysCount} día(s) con un valor no reconocido en el Excel (ni "Libre" ni un horario válido); no se contaron como trabajo, descanso ni vacaciones.`);
  }
  if (!items.length) { el.classList.add('hidden'); el.innerHTML = ''; return; }
  el.classList.remove('hidden');
  el.innerHTML = '<ul class="list-disc list-inside space-y-1">' +
    items.map(i => `<li>${escapeHtml(i)}</li>`).join('') +
    '</ul>';
}

function renderSummaryCard(month, stats) {
  document.getElementById('summaryCard').innerHTML = `
    <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-5">
      <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wide">Resumen</h2>
      <dl class="mt-3 grid grid-cols-2 sm:grid-cols-3 gap-4 text-sm">
        <div><dt class="text-slate-500">Nombre</dt><dd class="text-slate-200">${escapeHtml(toTitleCase(month.employeeName))}</dd></div>
        <div><dt class="text-slate-500">Departamento</dt><dd class="text-slate-200">${escapeHtml(month.department)}</dd></div>
        <div><dt class="text-slate-500">Mes</dt><dd class="text-slate-200">${toTitleCase(MONTH_NAMES_ES[month.monthIndex])} ${month.year}</dd></div>
        <div><dt class="text-slate-500">Total turnos</dt><dd class="text-slate-200 font-mono">${stats.shiftsCount}</dd></div>
        <div><dt class="text-slate-500">Días libres</dt><dd class="text-slate-200 font-mono">${stats.restDaysCount}</dd></div>
        <div>
          <dt class="text-slate-500">Vacaciones</dt>
          <dd class="text-slate-200 font-mono">${stats.vacationDaysCount}</dd>
          ${stats.vacationDaysCount === 0 ? '<dd class="text-xs text-slate-500">(sin datos de vacaciones en el archivo)</dd>' : ''}
        </div>
      </dl>
    </div>`;
}

function buildMonthGrid(month) {
  const dayMap = new Map();
  month.targetDays.forEach(d => dayMap.set(d.date.getDate(), d));
  const firstOfMonth = new Date(month.year, month.monthIndex, 1);
  const daysInMonth = new Date(month.year, month.monthIndex + 1, 0).getDate();
  const leadingBlanks = (firstOfMonth.getDay() + 6) % 7;

  const cells = [];
  for (let i = 0; i < leadingBlanks; i++) cells.push(null);
  for (let dnum = 1; dnum <= daysInMonth; dnum++) {
    cells.push(dayMap.get(dnum) || { date: new Date(month.year, month.monthIndex, dnum), type: 'desconocido', raw: '' });
  }
  while (cells.length % 7 !== 0) cells.push(null);
  return cells;
}

function renderCalendarCell(cell, selectedKey, todayKey) {
  if (!cell) return '<div></div>';
  const key = toKey(cell.date);
  const meta = STATUS_META[cell.type];
  const isSelected = key === selectedKey;
  const isToday = key === todayKey;
  const ring = isSelected ? 'ring-2 ring-indigo-400' : (isToday ? 'ring-1 ring-slate-500' : 'ring-1 ring-slate-800');
  const timeLabel = cell.type === 'trabajo'
    ? `<div class="mt-1 text-[10px] sm:text-xs font-mono text-slate-400 truncate">${escapeHtml(cell.raw)}</div>` : '';
  return `<button type="button" data-date="${key}"
    class="aspect-square w-full rounded-lg ${ring} ${meta.bg} p-1.5 sm:p-2 flex flex-col items-start text-left hover:ring-indigo-400/60 transition-colors">
    <div class="flex items-center justify-between w-full">
      <span class="text-xs sm:text-sm font-mono text-slate-200">${cell.date.getDate()}</span>
      <span class="text-[10px] sm:text-xs">${meta.emoji}</span>
    </div>
    ${timeLabel}
  </button>`;
}

function renderCalendarSection(month) {
  const cells = buildMonthGrid(month);
  const selectedKey = state.selectedDateKey;
  const todayKey = toKey(stripTime(new Date()));
  const weekdayHeader = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom']
    .map(w => `<div class="text-center text-xs text-slate-500">${w}</div>`).join('');

  document.getElementById('calendarSection').innerHTML = `
    <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wide mb-3">Calendario mensual</h2>
    <div class="grid grid-cols-7 gap-1.5 mb-1.5">${weekdayHeader}</div>
    <div class="grid grid-cols-7 gap-1.5">${cells.map(c => renderCalendarCell(c, selectedKey, todayKey)).join('')}</div>`;
}

function renderAgendaCard(day, selectedKey) {
  const key = toKey(day.date);
  const isSelected = key === selectedKey;
  const wd = WEEKDAY_FULL[(day.date.getDay() + 6) % 7];
  const scheduleLine = day.type === 'trabajo'
    ? `<div class="font-mono text-sm text-slate-200 mt-1">${escapeHtml(day.raw)}</div>`
    : '<div class="text-sm text-slate-500 mt-1">—</div>';
  return `<button type="button" data-date="${key}"
    class="min-w-[132px] shrink-0 rounded-xl border p-3 text-left transition-colors ${isSelected ? 'border-indigo-400 bg-indigo-500/10' : 'border-slate-800 bg-slate-900/60 hover:border-indigo-400/40'}">
    <div class="text-xs uppercase tracking-wide text-slate-500">${wd}</div>
    <div class="text-sm font-medium text-slate-200">${day.date.getDate()} ${MONTH_NAMES_ES[day.date.getMonth()].slice(0, 3)}</div>
    ${scheduleLine}
    <div class="mt-2">${statusChip(day.type)}</div>
  </button>`;
}

function renderAgendaSection(month) {
  const cells = buildMonthGrid(month);
  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));
  const selectedKey = state.selectedDateKey;

  const weeksHtml = weeks.map(week => {
    const real = week.filter(Boolean);
    if (!real.length) return '';
    const label = `${real[0].date.getDate()} – ${real[real.length - 1].date.getDate()} de ${MONTH_NAMES_ES[real[0].date.getMonth()]}`;
    return `<div>
      <div class="text-xs text-slate-500 mb-2">${label}</div>
      <div class="flex gap-2 overflow-x-auto pb-1">${real.map(d => renderAgendaCard(d, selectedKey)).join('')}</div>
    </div>`;
  }).join('');

  document.getElementById('agendaSection').innerHTML = `
    <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wide mb-3">Agenda semanal</h2>
    <div class="space-y-4">${weeksHtml}</div>`;
}

function renderNextShiftCard(nextShift) {
  const now = new Date();
  let body;
  if (nextShift) {
    const label = relativeDayLabel(stripTime(nextShift.date), stripTime(now));
    body = `
      <div class="text-xs text-indigo-300">${label}</div>
      <div class="mt-1 text-base font-medium text-slate-100">${formatDateLong(nextShift.date)}</div>
      <div class="mt-1 font-mono text-lg text-slate-200">${escapeHtml(nextShift.raw)}</div>`;
  } else {
    body = '<div class="text-sm text-slate-500">No hay turnos futuros registrados en los datos cargados.</div>';
  }
  document.getElementById('nextShiftCard').innerHTML = `
    <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-5">
      <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wide">Próximo turno</h2>
      <div class="mt-2">${body}</div>
    </div>`;
}

function renderNextRestCard(nextRest) {
  const now = new Date();
  let body;
  if (nextRest) {
    const label = relativeDayLabel(stripTime(nextRest.date), stripTime(now));
    body = `
      <div class="text-xs text-sky-300">${label}</div>
      <div class="mt-1 text-base font-medium text-slate-100">${formatDateLong(nextRest.date)}</div>`;
  } else {
    body = '<div class="text-sm text-slate-500">No hay días libres futuros registrados en los datos cargados.</div>';
  }
  document.getElementById('nextRestCard').innerHTML = `
    <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-5">
      <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wide">Próximo descanso</h2>
      <div class="mt-2">${body}</div>
    </div>`;
}

function renderCoworkersCard(month) {
  const el = document.getElementById('coworkersCard');
  if (!state.selectedDateKey) { el.innerHTML = ''; return; }
  const info = getCoworkerMatches(month, state.selectedDateKey);
  const dateLabel = formatDateLong(fromKey(state.selectedDateKey));

  let body;
  if (!info.applicable) {
    body = `<div class="text-sm text-slate-500">Ese día no es un turno de trabajo, así que no aplica la comparación de compañeros.</div>`;
  } else if (!info.matches.length) {
    body = `<div class="text-sm text-slate-400">No hay compañeros coincidiendo en este turno.</div>`;
  } else {
    body = `<ul class="space-y-2">${info.matches.map(m => `
      <li class="flex items-center justify-between rounded-lg border border-slate-800 bg-slate-950/40 px-3 py-2">
        <span class="text-sm text-slate-200">${escapeHtml(toTitleCase(m.name))}</span>
        <span class="font-mono text-sm text-slate-400">${escapeHtml(m.raw)}</span>
      </li>`).join('')}</ul>`;
  }

  el.innerHTML = `
    <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-5">
      <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wide">Compañeros de turno</h2>
      <p class="mt-1 text-xs text-slate-500">Mostrando ${dateLabel} · tocá cualquier día del calendario o la agenda para ver otro</p>
      <div class="mt-3">${body}</div>
    </div>`;
}

function statRow(label, value) {
  return `<div class="flex items-center justify-between py-1.5 border-b border-slate-800/70 last:border-0">
    <span class="text-sm text-slate-400">${escapeHtml(label)}</span>
    <span class="text-sm font-mono text-slate-200">${value}</span>
  </div>`;
}

function renderStatsSection(stats) {
  const workBlock = `
    <h3 class="text-xs font-semibold text-emerald-400 uppercase tracking-wide mb-1">Trabajo</h3>
    ${statRow('Horas trabajadas este mes', fmtHours(stats.totalWorkedHours))}
    ${statRow('Número de turnos', stats.shiftsCount)}
    ${statRow('Promedio por turno', fmtHours(stats.avgShiftHours))}
    ${statRow('Turno más largo', stats.longestShift ? `${fmtHours(stats.longestShift.durationHours)} (${formatDateShort(stats.longestShift.date)})` : '—')}
    ${statRow('Turno más corto', stats.shortestShift ? `${fmtHours(stats.shortestShift.durationHours)} (${formatDateShort(stats.shortestShift.date)})` : '—')}`;

  const restBlock = `
    <h3 class="text-xs font-semibold text-sky-400 uppercase tracking-wide mb-1 mt-4">Descanso</h3>
    ${statRow('Días libres', stats.restDaysCount)}
    ${statRow('Vacaciones', stats.vacationDaysCount)}
    ${statRow('Días consecutivos trabajados (máx.)', stats.longestStreak)}`;

  const sleepNote = stats.sleepGaps.length
    ? ''
    : '<p class="text-xs text-slate-500 mt-1">No hay suficientes turnos consecutivos este mes para calcular huecos de sueño.</p>';

  const sleepBlock = `
    <h3 class="text-xs font-semibold text-amber-300 uppercase tracking-wide mb-1 mt-4">Sueño (meta: ${SLEEP_HOURS_TARGET}h/día)</h3>
    ${statRow('Promedio disponible entre turnos', fmtHours(stats.avgSleepGap))}
    ${statRow(`Días con menos de ${SLEEP_HOURS_TARGET}h`, stats.sleepGaps.length ? stats.daysBelowTarget : '—')}
    ${statRow(`Días con ${SLEEP_HOURS_TARGET}h o más`, stats.sleepGaps.length ? stats.daysAtOrAboveTarget : '—')}
    ${sleepNote}
    <p class="text-xs text-slate-500 mt-2">El primer turno del mes no tiene un turno anterior dentro del mismo mes, así que ese hueco no se cuenta.</p>`;

  document.getElementById('statsSection').innerHTML = `
    <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-5">
      <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wide">Estadísticas</h2>
      <div class="mt-2">${workBlock}${restBlock}${sleepBlock}</div>
    </div>`;
}

function renderDashboardCards(stats, nextShift) {
  const cards = [
    dashboardCard('Horas trabajadas', fmtHours(stats.totalWorkedHours), 'este mes'),
    dashboardCard('Promedio por turno', fmtHours(stats.avgShiftHours), 'este mes'),
    dashboardCard('Días libres', stats.restDaysCount, 'este mes'),
    dashboardCard('Próximo turno', nextShift ? formatDateShort(nextShift.date) : '—', nextShift ? nextShift.raw : 'sin datos'),
    dashboardCard('Horas p/ dormir', fmtHours(stats.avgSleepGap), 'promedio este mes')
  ];
  document.getElementById('dashboardCards').innerHTML = cards.join('');
}

function renderAll() {
  const month = activeMonth();
  if (!month) return;

  const stats = computeMonthStats(month);
  renderWarningBanner(stats.unknownDaysCount);
  renderMonthTabs();

  const allDays = getAllTargetDaysSorted(state);
  const now = new Date();
  const nextShift = findNextShift(allDays, now);
  const nextRest = findNextRest(allDays, now);

  document.getElementById('headerSubtitle').textContent =
    `${toTitleCase(month.employeeName)} · ${month.department}`;

  renderDashboardCards(stats, nextShift);
  renderSummaryCard(month, stats);
  renderCalendarSection(month);
  renderAgendaSection(month);
  renderNextShiftCard(nextShift);
  renderNextRestCard(nextRest);
  renderCoworkersCard(month);
  renderStatsSection(stats);
}

// ============================================================
// EVENTOS
// ============================================================
function setSelectedDate(key) {
  state.selectedDateKey = key;
  const month = activeMonth();
  renderCalendarSection(month);
  renderAgendaSection(month);
  renderCoworkersCard(month);
}

function setActiveMonth(index) {
  state.activeMonthIndex = index;
  state.selectedDateKey = pickDefaultSelectedDate();
  renderAll();
}

function showError(message) {
  const el = document.getElementById('errorState');
  el.classList.remove('hidden');
  el.innerHTML = `<p class="font-medium">No se pudo procesar el archivo</p><p class="mt-1 text-sm">${escapeHtml(message)}</p>`;
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('emptyState').classList.remove('hidden');
}

function clearError() {
  const el = document.getElementById('errorState');
  el.classList.add('hidden');
  el.innerHTML = '';
}

function handleFile(file) {
  if (!file) return;
  clearError();
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
      const { monthEntries, skipped } = parseWorkbook(workbook);

      if (!monthEntries.length) {
        showError(`No se encontró a ${toTitleCase(TARGET_EMPLOYEE)} en ninguna hoja de este archivo.`);
        return;
      }

      state.monthEntries = monthEntries;
      state.skipped = skipped;
      state.activeMonthIndex = pickDefaultMonthIndex();
      state.selectedDateKey = pickDefaultSelectedDate();

      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('changeFileBtn').classList.remove('hidden');
      renderAll();
    } catch (err) {
      showError(err.message || 'Ocurrió un error inesperado al leer el archivo.');
    }
  };
  reader.onerror = () => showError('No se pudo leer el archivo seleccionado.');
  reader.readAsArrayBuffer(file);
}

document.getElementById('pickFileBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('changeFileBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', (e) => handleFile(e.target.files[0]));

const emptyState = document.getElementById('emptyState');
emptyState.addEventListener('click', () => document.getElementById('fileInput').click());
emptyState.addEventListener('dragover', (e) => { e.preventDefault(); emptyState.classList.add('border-indigo-400'); });
emptyState.addEventListener('dragleave', () => emptyState.classList.remove('border-indigo-400'));
emptyState.addEventListener('drop', (e) => {
  e.preventDefault();
  emptyState.classList.remove('border-indigo-400');
  handleFile(e.dataTransfer.files[0]);
});

document.getElementById('monthTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-monthidx]');
  if (btn) setActiveMonth(Number(btn.dataset.monthidx));
});

for (const id of ['calendarSection', 'agendaSection']) {
  document.getElementById(id).addEventListener('click', (e) => {
    const btn = e.target.closest('[data-date]');
    if (btn) setSelectedDate(btn.dataset.date);
  });
}
</script>
</body>
</html>
